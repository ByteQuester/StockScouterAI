base_config:
  curve: "monotoneX"
  enablePointLabel: True
  enableTouchCrosshair: True
  xFormat: "time:%Y-%m-%d"
  theme: "dark"
  margin: {top: 50, right: 110, bottom: 50, left: 60}
  xScale: {type: 'time', useUTC: false, precision: 'month', format: '%Y-%m-%d'}
  yScale: {type: 'linear', min: 'auto', max: 'auto'}
  yFormat: " >-.2f"
  axisTop: null
  axisRight: null
  axisBottom:
    format: '%Y %b %d'
    tickSize: 5
    tickPadding: 5
    tickRotation: -40
    legendOffset: -2
    tickValues: 'every 6 months'
    legendPosition: 'middle'
  axisLeft:
    tickSize: 5
    tickPadding: 5
    tickRotation: 0
    legend: 'linear scale'
    legendOffset: -40
    legendPosition: 'middle'
  enableGridX: False
  enableGridY: True
  pointSize: 16
  pointColor: {theme: 'background'}
  pointBorderWidth: 1
  pointBorderColor: {from: 'serieColor'}
  pointLabelYOffset: -12
  useMesh: True
  legends:
    - anchor: 'bottom-right'
      direction: 'column'
      justify: False
      translateX: 100
      translateY: 0
      itemsSpacing: 2
      itemDirection: 'left-to-right'
      itemWidth: 80
      itemHeight: 20
      itemOpacity: 0.75
      symbolSize: 12
      symbolShape: 'circle'
      symbolBorderColor: 'rgba(0, 0, 0, .5)'
      effects:
        - on: 'hover'
          style:
            itemBackground: 'rgba(0, 0, 0, .03)'
            itemOpacity: 1

divergence_chart_config:
  theme: "dark"
  animate: True
  areaOpacity: 0.07 #
  colors: #
    - 'rgb(97, 205, 187)'
    - 'rgb(244, 117, 96)'
  crosshairType: "cross" #
  curve: "monotoneX"
  enableArea: True
  enablePointLabel: True
  margin: {top: 50, right: 110, bottom: 50, left: 60}
  pointBorderColor:
    from: 'color'
    modifiers:
      - ['darker', 0.3]
  pointBorderWidth: 1
  pointLabelYOffset: -20
  pointSize: 14
  useMesh: True
  xScale:
    type: 'point'
    max: auto
    min: auto
  yScale:
    max: auto
    min: auto
    stacked: False
    type: 'linear'
  yFormat: " >-.2f"
  axisTop: null
  axisRight: null
  axisBottom:
    tickSize: 5
    tickPadding: 5
    tickRotation: -45
    legend: 'Date'
    legendOffset: 45
    legendPosition: 'middle'
  axisLeft:
    tickSize: 5
    tickPadding: 5
    tickRotation: 0
    legend: 'Amount'
    legendOffset: -40
    legendPosition: 'middle'
  enableGridX: False
  enableGridY: True
  legends:
    - anchor: 'bottom-right'
      direction: 'column'
      justify: False
      translateX: 110
      translateY: 0
      itemsSpacing: 1
      itemDirection: 'left-to-right'
      itemWidth: 80
      itemHeight: 20
      itemOpacity: 0.75
      symbolSize: 12
      symbolShape: 'circle'
      symbolBorderColor: 'rgba(0, 0, 0, .5)'
      effects:
        - on: 'hover'
          style:
            itemBackground: 'rgba(0, 0, 0, .03)'
            itemOpacity: 1
